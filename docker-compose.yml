services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_data:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build: .
    image: nexus-learner:latest
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379
      - WATCHFILES_FORCE_POLLING=true
      - ANTHROPIC_API_KEY
    volumes:
      - .:/app
    depends_on:
      - qdrant
      - redis

  ui:
    image: nexus-learner:latest
    command: streamlit run app.py --server.fileWatcherType poll
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      - API_BASE_URL=http://api:8000
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY
    volumes:
      - .:/app
    depends_on:
      - api
