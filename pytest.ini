[pytest]
# Custom markers
markers =
    slow: marks tests as slow (require live LLM + Qdrant APIs). Run with: pytest -m slow
    integration: marks tests that need an embedding backend or live Qdrant (no full LLM call)
    modal_e2e: marks tests that require a live Modal deployment. Run with: pytest -m modal_e2e

# By default, skip slow and modal_e2e tests.
addopts = -m "not slow and not modal_e2e"
